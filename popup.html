<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <title>Telegram Sessiyalar</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 15px; width: 380px; background: #f0f2f5; margin: 0; }
    h2 { margin: 0 0 15px; color: #0088cc; text-align: center; font-size: 20px; }
    label { display: block; margin: 12px 0 5px; font-weight: bold; font-size: 14px; }
    input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
    button { width: 100%; padding: 12px; background: #0088cc; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
    button:hover { background: #006699; }
    button:disabled { background: #aaa; cursor: not-allowed; }
    #status { margin: 10px 0; padding: 10px; border-radius: 6px; font-weight: bold; text-align: center; background: #fff; border: 1px solid #ddd; }
    #status.success { background: #d4edda; color: #155724; border-color: #c3e6cb; }
    #status.error { background: #f8d7da; color: #721c24; border-color: #f5c6cb; }
    pre { background: white; padding: 12px; border: 1px solid #ddd; border-radius: 6px; white-space: pre-wrap; max-height: 250px; overflow-y: auto; font-size: 12px; margin-top: 10px; }
    .hidden { display: none !important; }
  </style>
  <script src="https://unpkg.com/@mtproto/core@latest/dist/index.min.js"></script>
</head>
<body>
  <h2>Telegram Sessiyalar</h2>
  
  <label>Telefon raqami (+998...):</label>
  <input type="tel" id="phone" placeholder="+998901234567" />
  
  <div id="codeStep" class="hidden">
    <label>SMS kod (Telegramdan):</label>
    <input type="text" id="code" placeholder="12345" maxlength="5" />
  </div>
  
  <div id="passwordStep" class="hidden">
    <label>2FA paroli (ikki bosqichli):</label>
    <input type="password" id="password" placeholder="Sizning parolingiz" />
  </div>
  
  <button id="loginBtn">SMS kod yuborish</button>
  
  <div id="status"></div>
  <pre id="result"></pre>

  <script src="popup.js"></script>
</body>
</html>
